<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>La Sobremesa · ¡Aquí se viene a jugar!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
@font-face {
  font-family: "East Kind";
  src: url("fonts/East Kind 1.otf") format("opentype");
  font-display: swap;
}

/* LA SOBREMESA — Design tokens + base styles */

:root {
  /* Principales */
  --rojo: #D90E15;
  --azul: #355FA9;
  --verde-lima: #CEC80A;
  /* Secundarios */
  --rosa: #F4A8BE;
  --verde: #049368;
  --amarillo: #F6D518;
  /* Neutros */
  --crema: #F6EFD9;
  --crema-2: #EFE6C8;
  --tinta: #141313;
  --tinta-soft: #1E1B1B;

  --display: "East Kind", sans-serif;
  --body: "Helvetica Neue", sans-serif;

  --edge: 1px solid currentColor;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--crema);
  color: var(--tinta);
  font-family: var(--body);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-size: 16px;
  line-height: 1.4;
  overflow-x: hidden;
}

button, input, textarea, select {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
}

a { color: inherit; text-decoration: none; }

img { display: block; max-width: 100%; }

/* Display type — East Kind, layout-safe */
.display {
  font-family: var(--display);
  text-transform: uppercase;
  font-weight: 400;
  display: block;
  width: 100%;
  line-height: 0.9;
  letter-spacing: 0.0em;
  font-stretch: 150%;
  -webkit-font-smoothing: antialiased;
}

/* Helvetica heavy for section labels */
.label {
  font-family: var(--body);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-size: 12px;
}

.body-l { font-size: 19px; line-height: 1.45; }
.body-m { font-size: 16px; line-height: 1.5; }
.body-s { font-size: 14px; line-height: 1.5; }

/* Color blocks */
.bg-rojo     { background: var(--rojo);     color: var(--verde-lima); }
.bg-azul     { background: var(--azul);     color: var(--crema); }
.bg-lima     { background: var(--verde-lima); color: var(--rojo); }
.bg-crema    { background: var(--crema);    color: var(--tinta); }
.bg-tinta    { background: var(--tinta);    color: var(--crema); }
.bg-verde    { background: var(--verde);    color: var(--crema); }
.bg-rosa     { background: var(--rosa);     color: var(--rojo); }
.bg-amarillo { background: var(--amarillo); color: var(--rojo); }

/* Layout */
.wrap {
  width: 100%;
  max-width: 1440px;
  margin: 0 auto;
  padding: 0 32px;
}
@media (max-width: 700px) {
  .wrap { padding: 0 20px; }
}

.stack-xs > * + * { margin-top: 8px; }
.stack-s  > * + * { margin-top: 14px; }
.stack-m  > * + * { margin-top: 24px; }
.stack-l  > * + * { margin-top: 40px; }
.stack-xl > * + * { margin-top: 72px; }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 16px 28px;
  border: 1.5px solid currentColor;
  border-radius: 999px;
  font-family: var(--body);
  font-weight: 700;
  text-transform: uppercase;
  font-size: 13px;
  letter-spacing: 0.08em;
  cursor: pointer;
  background: transparent;
  transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease;
}
.btn:hover { transform: translate(-2px,-2px); }
.btn:active { transform: translate(0,0); }

.btn-filled-dark { background: var(--tinta); color: var(--crema); border-color: var(--tinta); }
.btn-filled-dark:hover { background: var(--rojo); border-color: var(--rojo); color: var(--verde-lima); }

.btn-filled-lima { background: var(--verde-lima); color: var(--rojo); border-color: var(--verde-lima); }
.btn-filled-lima:hover { background: var(--rojo); color: var(--verde-lima); border-color: var(--rojo); }

.btn-filled-rojo { background: var(--rojo); color: var(--verde-lima); border-color: var(--rojo); }
.btn-filled-rojo:hover { background: var(--tinta); color: var(--verde-lima); border-color: var(--tinta); }

.btn .arrow { display: inline-block; transition: transform 0.2s ease; }
.btn:hover .arrow { transform: translateX(4px); }

/* Marquee */
@keyframes marquee-scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
.marquee { overflow: hidden; white-space: nowrap; }
.marquee-track {
  display: inline-flex;
  gap: 48px;
  animation: marquee-scroll 18s linear infinite;
  will-change: transform;
}
.marquee:hover .marquee-track { animation-play-state: paused; }

/* Placeholder imagery — diagonal stripes w/ monospace caption */
.placeholder {
  position: relative;
  background:
    repeating-linear-gradient(
      45deg,
      rgba(20,19,19,0.08) 0 1px,
      transparent 1px 14px
    ),
    var(--crema-2);
  color: var(--tinta);
  display: grid;
  place-items: center;
  font-family: var(--body);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border: 1px solid rgba(20,19,19,0.12);
}
.placeholder::before {
  content: attr(data-label);
  padding: 6px 10px;
  background: var(--tinta);
  color: var(--crema);
  border-radius: 999px;
}
.placeholder.dark {
  background:
    repeating-linear-gradient(45deg, rgba(246,239,217,0.10) 0 1px, transparent 1px 14px),
    var(--tinta-soft);
  color: var(--crema);
  border-color: rgba(246,239,217,0.2);
}
.placeholder.dark::before { background: var(--crema); color: var(--tinta); }

/* Spade / suit glyphs (tiny bits we draw ourselves — trivial shapes) */
.diamond {
  display: inline-block;
  width: 0.6em;
  height: 0.6em;
  background: currentColor;
  transform: rotate(45deg);
  vertical-align: middle;
  margin: 0 0.2em;
}

/* Nav */
.nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  background: rgba(246,239,217,0.88);
  border-bottom: 1px solid rgba(20,19,19,0.1);
}
.nav.on-dark { background: rgba(20,19,19,0.85); color: var(--crema); border-bottom-color: rgba(246,239,217,0.15); }

/* Focus */
:focus-visible { outline: 2px solid var(--rojo); outline-offset: 3px; }

/* Utility */
.hover-lift { transition: transform 0.25s ease; }
.hover-lift:hover { transform: translateY(-4px); }

.divider { height: 1px; background: currentColor; opacity: 0.2; }

.rotate-chip {
  display: inline-block;
  transform: rotate(-4deg);
}

/* Cesta / toast */
.toast {
  position: fixed;
  right: 24px;
  bottom: 24px;
  z-index: 80;
  padding: 16px 20px;
  border-radius: 16px;
  background: var(--tinta);
  color: var(--crema);
  max-width: 320px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  animation: pop 0.3s ease;
}
@keyframes pop {
  from { transform: translateY(20px) scale(0.95); opacity: 0; }
  to { transform: translateY(0) scale(1); opacity: 1; }
}

/* Hamburger / mobile nav */
.nav-desktop { display: flex; gap: 28px; align-items: center; }
.nav-mobile  { display: none; align-items: center; gap: 8px; }
.nav-dropdown {
  background: var(--crema);
  border-top: 1px solid rgba(20,19,19,0.1);
  width: 100%;
  overflow: hidden;
}
.nav-dropdown button {
  display: block;
  width: 100%;
  padding: 14px 24px;
  text-align: left;
  background: none;
  border: 0;
  border-bottom: 1px solid rgba(20,19,19,0.06);
  cursor: pointer;
  font-family: var(--body);
  font-weight: 700;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--tinta);
}
@media (max-width: 768px) {
  .nav-desktop { display: none !important; }
  .nav-mobile  { display: flex !important; }
}

/* Page transition */
.page-enter { animation: fadeUp 0.2s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* ===== RESPONSIVE HELPERS ===== */
.nav-menu {
  display: flex;
  gap: 28px;
  align-items: center;
}

/* ===== MOBILE — max 768px ===== */
@media (max-width: 768px) {

  /* 1. Nav: wrap links so they don't overflow */
  .nav-menu {
    gap: 4px 10px;
    flex-wrap: wrap;
    justify-content: flex-end;
    max-width: calc(100% - 90px);
  }

  /* 2. Hero h1 — reduce min so it fits on small screens */
  .hero-h1 {
    font-size: clamp(40px, 12vw, 120px) !important;
    white-space: normal !important;
  }

  /* 3. Any 2-column grid → single column */
  .resp-grid-2 {
    grid-template-columns: 1fr !important;
    gap: 32px !important;
  }

  /* 4. Story grid / category grid: 3-col → 1-col */
  .resp-grid-3 {
    grid-template-columns: 1fr !important;
  }

  /* 5. HeroBlocks: stacked sections */
  .resp-grid-hero-blocks {
    grid-template-columns: 1fr !important;
    min-height: auto !important;
  }

  /* 6. Story cells: breathable height on mobile */
  .resp-story-cell {
    min-height: 300px !important;
    padding: 48px 24px !important;
  }

  /* 7. Values flex section → vertical stack */
  .resp-values-wrap {
    flex-direction: column !important;
  }
  .resp-values-wrap > * {
    min-height: 280px !important;
  }

  /* 8. Chip: scale down slightly so it doesn't dominate */
  .rotate-chip {
    transform: rotate(-4deg) scale(0.82) !important;
    transform-origin: bottom left !important;
  }

  /* 9. Global: prevent text overflow on any page */
  .wrap,
  .wrap * {
    word-wrap: break-word;
    overflow-wrap: break-word;
  }
}

</style>
</head>

<script type="text/babel" data-presets="react">




// ===== Logo.jsx =====
// Logo + brand glyphs
const { useState } = React;

// The logo from the PDF (cropped), inlined as data URL via window.__LOGO_DARK / __LOGO_CREAM.
function LogoImg({ color = "dark", height = 32, className = "" }) {
  const dark = window.__LOGO_DARK || "";
  const cream = window.__LOGO_CREAM || "";
  const base = { height, width: "auto" };
  if (color === "cream") {
    return <img src={cream} alt="La Sobremesa" style={base} className={className} />;
  }
  if (color === "light") {
    return <img src={dark} alt="La Sobremesa" style={{ ...base, filter: "invert(1)" }} className={className} />;
  }
  return <img src={dark} alt="La Sobremesa" style={base} className={className} />;
}

// Tiny decorative glyphs — baraja española suit marks
// Only primitive shapes: circle, diamond, lines — never complex SVG
function SuitCup({ size = 16, color = "currentColor" }) {
  // copa — simplified: circle + trapezoid pedestal
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" aria-hidden style={{ display: "inline-block", verticalAlign: "middle" }}>
      <circle cx="12" cy="9" r="6" fill={color} />
      <rect x="10.5" y="13" width="3" height="6" fill={color} />
      <rect x="7" y="18" width="10" height="2" fill={color} />
    </svg>);

}
function SuitCoin({ size = 16, color = "currentColor" }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" aria-hidden style={{ display: "inline-block", verticalAlign: "middle" }}>
      <circle cx="12" cy="12" r="9" fill={color} />
      <circle cx="12" cy="12" r="4.5" fill="none" stroke="var(--crema)" strokeWidth="1.2" />
    </svg>);

}
function SuitSword({ size = 16, color = "currentColor" }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" aria-hidden style={{ display: "inline-block", verticalAlign: "middle" }}>
      <rect x="11" y="3" width="2" height="14" fill={color} />
      <rect x="7" y="15" width="10" height="2" fill={color} />
      <rect x="10" y="17" width="4" height="4" fill={color} />
    </svg>);

}
function SuitClub({ size = 16, color = "currentColor" }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" aria-hidden style={{ display: "inline-block", verticalAlign: "middle" }}>
      <rect x="11" y="3" width="2" height="18" fill={color} />
      <rect x="4" y="11" width="16" height="2" fill={color} />
    </svg>);

}

Object.assign(window, { LogoImg, SuitCup, SuitCoin, SuitSword, SuitClub });


// ===== Nav.jsx =====
// Nav + Footer
const { useEffect: useEffectNav } = React;

function Nav({ route, setRoute, cartCount, onDark = false }) {
  const [menuOpen, setMenuOpen] = React.useState(false);
  const links = [
  { key: "home", label: "Inicio" },
  { key: "producto", label: "El juego" },
  { key: "nosotros", label: "Nosotros" },
  { key: "contacto", label: "Contacto" }];

  const linkStyle = (key) => ({
    background: "none", border: 0, cursor: "pointer",
    fontFamily: "var(--body)", fontWeight: 700, fontSize: 12,
    textTransform: "uppercase", letterSpacing: "0.08em",
    padding: "8px 2px",
    borderBottom: route === key ? "2px solid currentColor" : "2px solid transparent",
    color: "inherit"
  });

  return (
    <nav className={`nav ${onDark ? "on-dark" : ""}`} style={{ maxWidth: "100vw" }}>
      <div className="wrap" style={{ display: "flex", alignItems: "center", justifyContent: "space-between", height: 72 }}>
        <button onClick={() => setRoute("home")} style={{ background: "none", border: 0, cursor: "pointer", padding: 0, flexShrink: 0 }}>
          <LogoImg color={onDark ? "light" : "dark"} height={26} />
        </button>

        {/* Desktop links */}
        <div className="nav-desktop">
          {links.map((l) =>
            <button key={l.key} onClick={() => setRoute(l.key)} style={linkStyle(l.key)}>{l.label}</button>
          )}
          <button onClick={() => setRoute("cesta")} className="btn" style={{ padding: "10px 16px", fontSize: 11, borderColor: "currentColor" }}>
            Cesta ({cartCount})
          </button>
        </div>

        {/* Mobile: cesta + hamburger */}
        <div className="nav-mobile">
          <button onClick={() => setRoute("cesta")} className="btn" style={{ padding: "8px 14px", fontSize: 11, borderColor: "currentColor" }}>
            Cesta ({cartCount})
          </button>
          <button
            onClick={() => setMenuOpen(!menuOpen)}
            aria-label={menuOpen ? "Cerrar menú" : "Abrir menú"}
            style={{ background: "none", border: 0, cursor: "pointer", padding: "6px 4px", color: "inherit", display: "flex", flexDirection: "column", gap: 5 }}>
            <span style={{ display: "block", width: 22, height: 2, background: "currentColor", transition: "transform 0.2s", transform: menuOpen ? "rotate(45deg) translate(5px,5px)" : "none" }} />
            <span style={{ display: "block", width: 22, height: 2, background: "currentColor", transition: "opacity 0.2s", opacity: menuOpen ? 0 : 1 }} />
            <span style={{ display: "block", width: 22, height: 2, background: "currentColor", transition: "transform 0.2s", transform: menuOpen ? "rotate(-45deg) translate(5px,-5px)" : "none" }} />
          </button>
        </div>
      </div>

      {menuOpen && (
        <div className="nav-dropdown">
          {links.map((l) =>
            <button key={l.key} onClick={() => { setRoute(l.key); setMenuOpen(false); }} style={{
              display: "block", width: "100%", padding: "14px 24px",
              textAlign: "left",
              background: route === l.key ? "var(--crema-2)" : "none",
              border: 0, borderBottom: "1px solid rgba(20,19,19,0.06)",
              cursor: "pointer", fontFamily: "var(--body)", fontWeight: 700,
              fontSize: 14, textTransform: "uppercase", letterSpacing: "0.08em",
              color: "var(--tinta)"
            }}>{l.label}</button>
          )}
        </div>
      )}
    </nav>);

}

function Footer({ setRoute }) {
  return (
    <footer className="bg-tinta" style={{ color: "var(--crema)", padding: "24px 0" }}>
      <div className="wrap">
        <div style={{ display: "flex", alignItems: "center", gap: 16, fontSize: 11, fontFamily: "var(--body)", letterSpacing: "0.06em", textTransform: "uppercase", opacity: 0.6, flexWrap: "wrap", textAlign: "left" }}>
          <span>© 2026 LA SOBREMESA</span>
          <button onClick={() => setRoute("home")} style={linkBtn}>Inicio</button>
          <button onClick={() => setRoute("producto")} style={linkBtn}>El juego</button>
          <button onClick={() => setRoute("nosotros")} style={linkBtn}>Nosotros</button>
          <button onClick={() => setRoute("contacto")} style={linkBtn}>Contacto</button>

              <div className="display" style={{ fontSize: 48, color: "var(--rojo)", lineHeight: 0.95 }}>
                Recibido, {form.nombre || "amig@"}.
              </div>
              <p className="body-l" style={{ marginTop: 16, color: "var(--rojo)" }}>
                Contestamos antes de que se enfríe el café. Mientras tanto, échale un ojo al juego.
              </p>
              <button className="btn btn-filled-rojo" style={{ marginTop: 24 }} onClick={() => setRoute("producto")}>
                Ver el juego <span className="arrow">→</span>
              </button>
            </div>
          }
        </div>
      </section>
    </main>);

}

function Field({ label, value, onChange, placeholder, type = "text", textarea = false }) {
  return (
    <label style={{ display: "block", marginBottom: 20 }}>
      <span className="label" style={{ display: "block", marginBottom: 8 }}>{label}</span>
      {textarea ?
      <textarea value={value} onChange={onChange} placeholder={placeholder} rows={4}
      style={fieldStyle} /> :

      <input type={type} value={value} onChange={onChange} placeholder={placeholder}
      style={fieldStyle} />
      }
    </label>);

}

const fieldStyle = {
  width: "100%", padding: "14px 0",
  background: "transparent",
  border: 0, borderBottom: "1.5px solid var(--tinta)",
  outline: "none", fontFamily: "var(--body)", fontSize: 18, color: "var(--tinta)",
  resize: "vertical"
};

Object.assign(window, { Nosotros, Contacto });


// ===== Cesta.jsx =====
// Cesta + Tweaks + App
const { useState: useStateApp, useEffect: useEffectApp } = React;

function Cesta({ cart, setCart, setRoute }) {
  const gamePrice = 29;
  const subtotal = cart.reduce((s, it) => s + it.qty * gamePrice, 0);
  const envio = cart.length ? subtotal >= 40 ? 0 : 3.9 : 0;
  const total = subtotal + envio;

  const changeQty = (i, d) => {
    const next = cart.map((it, idx) => idx === i ? { ...it, qty: Math.max(0, it.qty + d) } : it).filter((it) => it.qty > 0);
    setCart(next);
  };

  const empty = cart.length === 0;

  return (
    <main className="page-enter">
      <section className="bg-crema" style={{ padding: "72px 0 0" }}>
        <div className="wrap">
          <div className="label">Cesta</div>
          <h1 className="display" style={{ fontSize: "clamp(56px, 9vw, 110px)", margin: "20px 0 16px", lineHeight: 0.9 }}>
            {empty ? "Cesta vacía. De momento." : "Esto ya casi es tuyo."}
          </h1>
          <p className="body-l" style={{ maxWidth: 540 }}>
            
          </p>
        </div>
      </section>

      <section className="bg-crema" style={{ padding: "60px 0 120px" }}>
        <div className="wrap" style={{ display: "grid", gridTemplateColumns: "1.4fr 1fr", gap: 56 }}>
          <div>
            {empty ?
            <div style={{ border: "1px dashed var(--tinta)", borderRadius: 20, padding: 48, textAlign: "center" }}>
                <div className="display" style={{ fontSize: 40, color: "var(--rojo)" }}>Pedimos otra.</div>
                <button className="btn btn-filled-dark" style={{ marginTop: 24 }} onClick={() => setRoute("producto")}>
                  Ver el juego <span className="arrow">→</span>
                </button>
              </div> :

            cart.map((it, i) =>
            <div key={i} style={{ display: "grid", gridTemplateColumns: "120px 1fr auto", gap: 20, padding: "24px 0", borderBottom: "1px solid rgba(20,19,19,0.15)", alignItems: "center" }}>
                  <div className="placeholder" data-label="caja" style={{ aspectRatio: "1/1", borderRadius: 10 }} />
                  <div>
                    <div className="display" style={{ fontSize: 28 }}>Don Refranote · El juego</div>
                    <div className="body-s" style={{ opacity: 0.7, marginTop: 6 }}>Edición estándar · 200 cartas · 1 dado</div>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, border: "1.5px solid var(--tinta)", borderRadius: 999, padding: "4px 10px", marginTop: 12, width: "fit-content" }}>
                      <button onClick={() => changeQty(i, -1)} style={iconBtn}>−</button>
                      <div style={{ minWidth: 24, textAlign: "center", fontWeight: 700 }}>{it.qty}</div>
                      <button onClick={() => changeQty(i, +1)} style={iconBtn}>+</button>
                    </div>
                  </div>
                  <div className="display" style={{ fontSize: 32, color: "var(--rojo)" }}>{(it.qty * gamePrice).toFixed(0)} €</div>
                </div>
            )
            }
          </div>

          <aside style={{ position: "sticky", top: 100, alignSelf: "start", border: "1px solid var(--tinta)", borderRadius: 20, padding: 32, background: "var(--crema-2)" }}>
            <div className="label">Resumen</div>
            <Row k="Subtotal" v={`${subtotal.toFixed(2)} €`} />
            <Row k={`Envío${envio === 0 && !empty ? " (gratis)" : ""}`} v={envio === 0 ? empty ? "—" : "0 €" : `${envio.toFixed(2)} €`} />
            <div className="divider" style={{ margin: "16px 0" }} />
            <Row k="Total" v={`${total.toFixed(2)} €`} big />
            {!empty && subtotal < 40 &&
            <p className="body-s" style={{ marginTop: 8, color: "var(--rojo)" }}>
                Te quedan {(40 - subtotal).toFixed(2)} € para envío gratis. ¿Otra? 
              </p>
            }
            <button disabled={empty} className="btn btn-filled-dark" style={{ width: "100%", justifyContent: "center", marginTop: 20, opacity: empty ? 0.4 : 1 }}>
              Pagar <span className="arrow">→</span>
            </button>
            <p className="body-s" style={{ marginTop: 16, opacity: 0.7 }}>Pago seguro · Devolución 30 días · Envío 48h península</p>
          </aside>
        </div>

        {!empty &&
        <div className="wrap" style={{ marginTop: 80 }}>
            <div className="bg-lima" style={{ borderRadius: 20, padding: "48px 40px", display: "grid", gridTemplateColumns: "1fr auto", alignItems: "center", gap: 24 }}>
              <div>
                <div className="label" style={{ color: "var(--rojo)" }}>Un empujoncito</div>
                <div className="display" style={{ fontSize: 40, color: "var(--rojo)", marginTop: 10 }}>
                  Dale una vuelta. <em style={{ fontStyle: "normal", fontSize: 22 }}></em>
                </div>
              </div>
              <button className="btn btn-filled-rojo" onClick={() => setRoute("producto")}>
                Seguir mirando <span className="arrow">→</span>
              </button>
            </div>
          </div>
        }
      </section>
    </main>);

}

function Row({ k, v, big = false }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginTop: 14 }}>
      <span className="body-m" style={{ opacity: big ? 1 : 0.8, fontWeight: big ? 700 : 400 }}>{k}</span>
      <span className={big ? "display" : "body-m"} style={{ fontSize: big ? 34 : 16, color: big ? "var(--rojo)" : "inherit", fontWeight: big ? 400 : 600 }}>{v}</span>
    </div>);

}
const iconBtn = { background: "none", border: 0, cursor: "pointer", color: "var(--tinta)", fontSize: 18, padding: "4px 8px" };

// ---------- Toast ----------
function Toast({ msg }) {
  if (!msg) return null;
  return <div className="toast"><div className="label" style={{ color: "var(--verde-lima)", marginBottom: 4 }}>Añadido</div><div className="body-m">{msg}</div></div>;
}


Object.assign(window, { Cesta, Toast });


// ===== App.jsx =====
// Main App — routing + state
const { useState: useStateMain, useEffect: useEffectMain } = React;

function App() {
  const [route, setRouteState] = useStateMain(() => localStorage.getItem("ls-route") || "home");
  const [cart, setCart] = useStateMain(() => {
    try {return JSON.parse(localStorage.getItem("ls-cart") || "[]");} catch {return [];}
  });
  const [toast, setToast] = useStateMain(null);

  useEffectMain(() => {localStorage.setItem("ls-route", route);window.scrollTo(0, 0);}, [route]);
  useEffectMain(() => {localStorage.setItem("ls-cart", JSON.stringify(cart));}, [cart]);

  const setRoute = (r) => setRouteState(r);

  const addToCart = (qty = 1) => {
    const existing = cart.find((i) => i.id === "sobremesa");
    let next;
    if (existing) {
      next = cart.map((i) => i.id === "sobremesa" ? { ...i, qty: i.qty + qty } : i);
    } else {
      next = [...cart, { id: "sobremesa", qty }];
    }
    setCart(next);
    const msgs = ["La Sobremesa × " + qty + " a la cesta.", "Otra más al carro. Buena decisión.", "Esto ya casi es tuyo."];
    setToast(msgs[Math.floor(Math.random() * msgs.length)]);
    setTimeout(() => setToast(null), 2400);
  };

  const cartCount = cart.reduce((s, it) => s + it.qty, 0);

  return (
    <React.Fragment>
      <Nav route={route} setRoute={setRoute} cartCount={cartCount} />
      <div style={{ paddingTop: 72 }}>
        {route === "home" && <Home setRoute={setRoute} />}
        {route === "producto" && <Producto setRoute={setRoute} addToCart={addToCart} />}
        {route === "nosotros" && <Nosotros setRoute={setRoute} />}
        {route === "contacto" && <Contacto setRoute={setRoute} />}
        {route === "cesta" && <Cesta cart={cart} setCart={setCart} setRoute={setRoute} />}
        <Footer setRoute={setRoute} />
      </div>
      <Toast msg={toast} />
    </React.Fragment>);

}


Object.assign(window, { App });

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
